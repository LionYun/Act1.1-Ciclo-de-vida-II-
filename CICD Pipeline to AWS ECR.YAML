on:

 push:

  branches: [ "master" ] # Se activa al subir código a la rama master

 workflow_dispatch:   # Permite ejecutarlo manualmente también



jobs:

 build-and-push:

  runs-on: ubuntu-latest



  steps:

   # 1. Descarga el código del repositorio

   - name: Checkout repo

    uses: actions/checkout@v4



   # 2. Instala Node.js y dependencias

   - name: Setup Node.js

    uses: actions/setup-node@v4

    with:

     node-version: '20' # O la versión que uses

     cache: 'npm'

      

   - name: Install dependencies

    run: npm install



   # 3. Ejecuta pruebas unitarias

   - name: Run unit tests

    run: npm test



   # 4. Autentica con AWS

   - name: Configure AWS credentials

    uses: aws-actions/configure-aws-credentials@v4

    with:

     aws-access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}

     aws-secret-access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

     aws-region: ${{ secrets.AWS_REGION }}



   # 5. Login en Amazon ECR

   - name: Login to Amazon ECR

    id: login-ecr

    uses: aws-actions/amazon-ecr-login@v2



   # 6. Construye la imagen y la sube a ECR

   - name: Build, tag, and push image to Amazon ECR

    env:

     ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}

     ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

     IMAGE_TAG: ${{ github.sha }} # Usa el ID del commit como etiqueta

    run: |

     docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

     docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

     # Opcional: También taguear como 'latest'

     docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

     docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
